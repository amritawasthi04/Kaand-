name: newstler
description: Flutter News App with Provider

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  http: ^1.2.1
  cached_network_image: ^3.3.1
  url_launcher: ^6.3.0
  intl: ^0.19.0
  shimmer: ^3.0.0
  xml: ^6.5.0
  html: ^0.15.4
  hive: ^2.2.3
  hive_flutter: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/Globe.png