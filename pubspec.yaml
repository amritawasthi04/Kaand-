name: newstler
description: Flutter News App with Provider

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase — use consistent v3
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.0

  # State
  provider: ^6.1.2

  # Network
  http: ^1.2.1
  cached_network_image: ^3.3.1

  # Cache
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  crypto: ^3.0.3

  # RSS parsing
  xml: ^6.5.0
  html: ^0.15.4

  # UI
  url_launcher: ^6.3.0
  shimmer: ^3.0.0
  intl: ^0.19.0
  share_plus: ^10.0.2
  visibility_detector: ^0.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/Globe.png